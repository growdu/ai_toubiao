name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────
  # 文档结构校验：确保关键文件存在且非空
  # ───────────────────────────────────────────────────────────
  structure:
    name: Project structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required docs
        run: |
          set -euo pipefail
          
          required=(
            "README.md"
            "docs/framework.md"
            "docs/diaoyan.md"
            "docs/tech-selection.md"
            "docs/high-level-design.md"
          )
          
          missing=()
          for f in "${required[@]}"; do
            if [[ ! -s "$f" ]]; then
              missing+=("$f")
            fi
          done
          
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing or empty required files:"
            for f in "${missing[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi
          
          echo "All required docs present and non-empty."

  # ───────────────────────────────────────────────────────────
  # Markdown lint
  # ───────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        # Inline `globs:` would override .markdownlint-cli2.jsonc and re-introduce
        # web/node_modules/**/*.md into the lint set (the negation only matches
        # top-level node_modules). Read config from the project file instead,
        # which already excludes node_modules and .git.

  # ───────────────────────────────────────────────────────────
  # 链接检查（异步执行，不阻塞其他检查）
  # ───────────────────────────────────────────────────────────
  link-check:
    name: Link check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --no-progress '**/*.md' '**/*.yml' '**/*.yaml'
          fail: false
          jobSummary: true

  # ───────────────────────────────────────────────────────────
  # Mermaid 渲染校验：用 mermaid.js + Chrome 真实渲染所有
  # ```mermaid 代码块，确保语法合法、GitHub 能正常显示。
  # ───────────────────────────────────────────────────────────
  mermaid-lint:
    name: Mermaid lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Chrome
        # GitHub-hosted ubuntu-latest 镜像不预装 Chrome；puppeteer-core 启动
        # 时找不到可执行路径会让 mermaid-lint 直接 exit 2。装一次 chrome
        # 让 puppeteer-core 用 --no-sandbox + headless='new' 能渲染成功。
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium-browser chromium-codecs-ffmpeg-extra
          which chromium-browser chromium google-chrome || true

      - name: Install deps
        run: npm ci

      - name: Render mermaid blocks
        env:
          MERMAID_LINT_CHROME: /usr/bin/chromium-browser
        run: node tools/mermaid-lint.mjs

  # ───────────────────────────────────────────────────────────
  # MkDocs 严格构建校验：与 pages.yml 同一配置，确保本地能
  # 严格构建；警告视为失败（strict mode）。
  # ───────────────────────────────────────────────────────────
  mkdocs-build:
    name: MkDocs strict build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install mkdocs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: mkdocs build --strict
        run: mkdocs build --strict --clean

  # ───────────────────────────────────────────────────────────
  # 总状态：所有必须任务通过才算成功
  # ───────────────────────────────────────────────────────────
  ci-success:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [structure, markdown-lint, mermaid-lint, mkdocs-build]
    if: always()
    steps:
      - name: Check required jobs passed
        run: |
          if [[ "${{ needs.structure.result }}" != "success" ]]; then
            echo "::error::structure job failed"
            exit 1
          fi
          if [[ "${{ needs.markdown-lint.result }}" != "success" ]]; then
            echo "::error::markdown-lint job failed"
            exit 1
          fi
          if [[ "${{ needs.mermaid-lint.result }}" != "success" ]]; then
            echo "::error::mermaid-lint job failed"
            exit 1
          fi
          if [[ "${{ needs.mkdocs-build.result }}" != "success" ]]; then
            echo "::error::mkdocs-build job failed"
            exit 1
          fi
          echo "All required CI checks passed."
