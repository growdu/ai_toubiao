# nginx config for the bidwriter web SPA.
# - Serves the Vite build as static files
# - Falls back to index.html for SPA client-side routes (/bids, /bids/:id, etc.)
# - Proxies /api/* to api-gateway (compose service name)
# - Exposes /healthz for the Docker healthcheck

upstream bidwriter_api {
    server api-gateway:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # docker healthcheck endpoint (no upstream roundtrip)
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API proxy — anything /api/* goes to api-gateway
    location /api/ {
        proxy_pass         http://bidwriter_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: any unmatched route returns index.html so React Router
    # can take over. Static assets still resolve via the location / block
    # below because they hit the filesystem first.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively; never cache index.html.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
