openapi: 3.0.3
info:
  title: BidWriter Backend API
  version: 1.0.0
  description: |
    HTTP API 真相源。By `scripts/gen-api.py` 自动生成，依据各服务的 `internal/api/*.go`
    与 api-gateway 主入口的路由注册。

    ⚠️ 此规范目前仅包含 method / path / handler 三元组；请求 / 响应 schema 是占位符，
    在每个 service 接上 swag 注释之前请不要直接用于 SDK 生成。

    完整覆盖范围：
    - 10 个业务微服务
    - api-gateway 自管的 3 个 auth 端点
    - 共 73 个 public 路由

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发（api-gateway）
  - url: https://api.bidwriter.app/api/v1
    description: 生产（占位）

security:
  - bearerAuth: []

tags:
  - name: auth
    description: 认证（api-gateway 本地处理）
  - name: project
    description: 项目 / 标段 CRUD（project-svc）
  - name: document
    description: 招标与素材文档的上传 / 解析 / Markdown 化（document-svc）
  - name: workflow
    description: Step01-05 工作流编排、状态机、章节生成与导出（workflow-svc）
  - name: knowledge
    description: 知识库素材、pgvector 检索、chunk 管理（knowledge-svc）
  - name: audit
    description: 四层一致性审计 + agent 自动修复（audit-svc）
  - name: template
    description: 行业模板 / 模板市集（template-svc）
  - name: billing
    description: 订阅、Token 用量、硬限保护（billing-svc）
  - name: notify
    description: 邮件 / Webhook / IM 推送与用户偏好（notify-svc）
  - name: router
    description: 多模型路由、缓存、用量统计（router-svc）
  - name: docgen
    description: 独立 docx / pdf 导出引擎（doc-gen）

