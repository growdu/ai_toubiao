components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        `Authorization: Bearer <jwt>`。
        JWT 由 `POST /api/v1/auth/login` 签发；access TTL 默认 1h，refresh TTL 默认 30d。
        详见 docs/api/authentication.md。

  responses:
    BadRequest:
      description: 请求参数非法
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 未认证 / Token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Internal:
      description: 服务内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    OKEnvelope:
      type: object
      description: 通用成功响应外壳；具体业务字段见各服务。
      properties:
        code:
          type: string
          example: ok
        data:
          type: object
          additionalProperties: true
        request_id:
          type: string
          format: uuid

    Error:
      type: object
      description: 统一错误响应。错误码见 docs/api/errors.md。
      properties:
        code:
          type: string
          description: 业务错误码（machine-readable）
          example: invalid_input
        message:
          type: string
          description: 面向开发者的错误描述
        request_id:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true

    GenericRequest:
      type: object
      description: 占位请求体。实际 schema 待 swag 注释补齐后替换。
      additionalProperties: true
