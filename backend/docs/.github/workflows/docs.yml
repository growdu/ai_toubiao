name: Docs

# 'on' 必须加引号 —— PyYAML 会把裸的 on 解析为 Python True
"on":
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

# 允许 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 不要同时跑多个 docs 部署
concurrency:
  group: pages
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'

jobs:
  # =============================================================
  # Job 1: 构建文档
  # =============================================================
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 用于 lastUpdated / git revision

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-docs-${{ hashFiles('mkdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-docs-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs==1.6.0 \
            mkdocs-material==9.5.0 \
            pymdown-extensions==10.7 \
            mkdocs-mermaid2-plugin==1.1.2

      - name: Build docs (strict mode)
        run: |
          mkdocs build --strict --clean

      - name: Check broken internal links
        run: |
          # 简易 broken link 检查
          python -c "
          import os
          import re
          from pathlib import Path

          site_dir = Path('site')
          if not site_dir.exists():
              print('site/ not found')
              exit(1)

          # 找所有 markdown 源文件
          md_files = list(Path('docs').rglob('*.md'))
          broken = []
          for md in md_files:
              content = md.read_text(encoding='utf-8')
              # 找相对路径 .md 链接
              for match in re.finditer(r'\]\(([^)]+\.md)[#)]', content):
                  link = match.group(1)
                  # 跳过外部链接
                  if link.startswith('http') or link.startswith('mailto:'):
                      continue
                  # 解析相对路径
                  target = (md.parent / link).resolve()
                  target_md = target.with_suffix('.md')
                  if not target.exists() and not target_md.exists():
                      broken.append(f'{md}: {link}')

          if broken:
              print('Broken links:')
              for b in broken:
                  print(f'  - {b}')
              exit(1)
          print('All internal links OK')
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # =============================================================
  # Job 2: 部署到 GitHub Pages（仅 main）
  # =============================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # =============================================================
  # Job 3: PR 评论（仅 PR）
  # =============================================================
  pr-comment:
    name: Docs Preview Link
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = `## 📚 Docs Build Status

            ✅ Documentation built successfully.

            **预览**: ${process.env.PAGES_URL || '部署到 main 分支后可见'}

            **改动文件**:
            \`\`\`
            ${{ join(github.event.pull_request.changed_files || [], '\n') || '无文档改动' }}
            \`\`\`

            请 reviewer 关注：
            - [ ] 设计是否清晰
            - [ ] 链接是否正确
            - [ ] 例子是否充分
            - [ ] 是否符合 [documentation-style.md](https://github.com/${{ github.repository }}/blob/main/docs/development/documentation-style.md)

            ---
            > Generated by docs workflow
            `;

            // 找之前的评论
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Docs Build Status')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }