version: 2
updates:
  # ===========================================================
  # Go modules
  # ===========================================================
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    groups:
      go-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ===========================================================
  # npm/pnpm（前端）
  # ===========================================================
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "web"
    groups:
      web-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ===========================================================
  # GitHub Actions
  # ===========================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # ===========================================================
  # Docker（私有化 Helm）
  # ===========================================================
  - package-ecosystem: "docker"
    directory: "/helm"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "helm"
    commit-message:
      prefix: "chore(helm)"
      include: "scope"

  # ===========================================================
  # Pip（文档工具，私有化可选）
  # ===========================================================
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "scripts"
    commit-message:
      prefix: "chore(scripts)"
      include: "scope"